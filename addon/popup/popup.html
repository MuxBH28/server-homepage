<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 260px;
            padding: 16px;
            background-color: #111111;
            color: #e5e5e5;
            margin: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #262626;
            margin-bottom: 12px;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
        }

        .title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.01em;
        }

        .config-trigger {
            background: none;
            border: none;
            color: #737373;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.15s ease;
        }

        .config-trigger:hover {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .row {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid #262626;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.15s ease;
        }

        .row:hover {
            border-color: #404040;
        }

        .label {
            font-size: 0.812rem;
            color: #a3a3a3;
            font-weight: 500;
        }

        .value {
            font-size: 0.875rem;
            font-weight: 600;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .ok {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .warn {
            background-color: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .down {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="title-group">
            <div class="logo-dot"></div>
            <div class="title">Server Homepage</div>
        </div>
        <button id="options-btn" class="config-trigger">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
                </path>
            </svg>
        </button>
    </div>

    <div class="row">
        <span class="label">SYSTEM STATUS</span>
        <span id="status" class="status-badge ok">RUNNING</span>
    </div>

    <div class="row">
        <span class="label">CPU USAGE</span>
        <span id="cpu" class="value">-</span>
    </div>

    <div class="row">
        <span class="label">RAM UTILIZATION</span>
        <span id="ram" class="value">-</span>
    </div>

    <div class="row">
        <span class="label">CPU TEMPERATURE</span>
        <span id="temp" class="value">-</span>
    </div>

    <script src="popup.js"></script>
</body>

</html>
